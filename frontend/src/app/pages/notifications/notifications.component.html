<div class="page-layout">
  <app-navbar></app-navbar>

  <main class="main-content">
    <div class="page-header">
      <h1>🔔 Notifications</h1>
      <div style="display:flex; align-items:center; gap:16px;">
        <span class="unread-count" *ngIf="getUnreadCount() > 0">
          {{ getUnreadCount() }} unread
        </span>
        <button (click)="markAllRead()" class="btn-mark-read" *ngIf="getUnreadCount() > 0">
          ✓ Mark all as read
        </button>
      </div>
    </div>

    <div *ngIf="loading" class="empty-state">Loading...</div>


    <div class="notifications-list" *ngIf="!loading && notifications.length > 0">
      @for (n of notifications; track n.id) {
        <div class="notification-card" [class.unread]="!n.is_read" (click)="openNotification(n)">
          <span class="notif-icon">{{ n.type === 'comment' ? '💬' : '⏰' }}</span>
          <div class="notif-content">
            <p>{{ n.message }}</p>
            <span class="notif-time">{{ n.created_at | date:'medium' }}</span>
          </div>
          <span *ngIf="!n.is_read" class="unread-dot"></span>
        </div>
      }
    </div>

    <div *ngIf="!loading && notifications.length === 0" class="empty">
      <p>No notifications yet!</p>
    </div>

  </main>
</div>
