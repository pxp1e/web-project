<div class="auth-container">
  <div class="auth-card">
    <div class="logo">📋 TaskBoard</div>
    <h1>Create account</h1>
    <p class="subtitle">Join your team workspace</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <form (ngSubmit)="onRegister()">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="form.first_name" name="first_name" placeholder="First name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="form.last_name" name="last_name" placeholder="Last name" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" name="email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="form.username" name="username" placeholder="Choose a username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="form.password" name="password" placeholder="Create a password" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating...' : 'Create Account' }}
      </button>
    </form>

    <p class="switch-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
