<div class="page-layout">
  <nav class="sidebar">
    <div class="sidebar-logo">📋 TaskBoard</div>
    <ul class="nav-links">
      <li><a routerLink="/dashboard">🏠 Dashboard</a></li>
      <li><a routerLink="/teams" class="active">👥 Teams</a></li>
      <li><a routerLink="/subjects">📚 Subjects</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>My Teams</h1>
    </div>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div class="create-form">
      <h3>Create New Team</h3>
      <div class="form-row">
        <input [(ngModel)]="newTeamName" name="teamName" placeholder="Team name" class="input-field" />
        <select [(ngModel)]="selectedSubjectId" name="subject" class="input-field">
          <option [ngValue]="null" disabled>Select Subject</option>
          @for (s of subjects; track s.id) {
            <option [value]="s.id">{{ s.code }} - {{ s.name }}</option>
          }
        </select>
        <button (click)="createTeam()" class="btn-primary">Create Team</button>
      </div>
    </div>

    <div class="teams-grid">
      @for (team of teams; track team.id) {
        <div class="team-card">
          <div class="team-info">
            <h3>{{ team.name }}</h3>
            <p>📚 {{ team.subject_name }}</p>
            <p>👥 {{ team.members.length }} member(s)</p>
          </div>
          <div class="team-actions">
            <a [routerLink]="['/teams', team.id]" class="btn-secondary">Open Board</a>
            <button (click)="deleteTeam(team.id)" class="btn-danger">Delete</button>
          </div>
        </div>
      }
      @if (teams.length === 0) {
        <p class="empty-state">No teams yet. Create one above!</p>
      }
    </div>
  </main>
</div>
