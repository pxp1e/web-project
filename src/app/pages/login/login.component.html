<div class="auth-container">
  <div class="auth-card">
    <div class="logo">📋 TaskBoard</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your workspace</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Enter username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="switch-link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
